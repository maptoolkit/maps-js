name: Publish to npm and GitHub Packages

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm run test
        env:
          MAPTOOLKIT_API_KEY: ${{ secrets.MAPTOOLKIT_API_KEY }}
          MAPTOOLKIT_USER_AGENT: ${{ secrets.MAPTOOLKIT_USER_AGENT }}

  publish:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.version.outputs.version }}
      npm_tag: ${{ steps.version.outputs.npm_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Determine version and npm tag
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *"-"* ]]; then
            TAG=$(echo "$VERSION" | sed 's/.*-\([a-zA-Z]*\).*/\1/')
          else
            TAG="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "npm_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Verify npm access
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc
          npm whoami

      - name: Publish to npm
        continue-on-error: true
        run: npm publish --access public --tag ${{ steps.version.outputs.npm_tag }}

      - name: Publish to GitHub Packages
        continue-on-error: true
        run: |
          echo "@maptoolkit:registry=https://npm.pkg.github.com/" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          npm publish --access public --tag ${{ steps.version.outputs.npm_tag }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  push-to-static:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Checkout maptoolkit/static
        uses: actions/checkout@v4
        with:
          repository: maptoolkit/static
          token: ${{ secrets.STATIC_REPO_TOKEN }}
          path: static-repo

      - name: Commit and push dist files
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          TARGET="files/mtk/v${VERSION}"
          mkdir -p "static-repo/${TARGET}"
          cp dist/* "static-repo/${TARGET}/"
          cd static-repo
          git config user.name "maptoolkit-ops"
          git config user.email "technik@maptoolkit.com"
          git add "${TARGET}"
          git commit -m "chore: add maps-js dist files for ${VERSION}"
          git push
