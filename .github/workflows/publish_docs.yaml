name: Publish Docs

on:
  workflow_run:
    workflows: ["Generate API Docs"]
    branches: [main]
    types: [completed]

jobs:
  publish-docs:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout maps-js
        uses: actions/checkout@v4

      - name: Trigger docs workflow
        run: |
          jq -n \
            --rawfile api_md <(sed 's|# API Reference|---\ntitle: "API Reference"\nweight: 1\n---\n|g' docs/API.md) \
            '{api_md: $api_md}' \
          | gh workflow run update-maps-js-docs.yml \
              --repo maptoolkit/docs \
              --json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
