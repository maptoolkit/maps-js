name: Publish Docs

on:
  workflow_run:
    workflows: ["Generate API Docs"]
    branches: [main]
    types: [completed]

jobs:
  publish-docs:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout maps-js
        uses: actions/checkout@v4

      - name: Read files
        id: read
        run: |
          {
            echo 'api_md<<EOF'
            sed -e 's|# API Reference|---\ntitle: "API Reference"\nweight: 1\n---\n|g' docs/API.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Trigger docs workflow
        run: |
          gh workflow run update-maps-js-docs.yml \
            --repo maptoolkit/docs \
            --field api_md="${{ steps.read.outputs.api_md }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
