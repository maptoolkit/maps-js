<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./../dist/maptoolkit.css" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
      }

      #map {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>
    <script src="./../dist/maptoolkit.js"></script>
    <script>
      window.map = new maptoolkit.Map({ apiKey: "e140284b-fc55-4c33-aebb-f1bd529c1b51" }).setContainer("map");

      const geocoding = new maptoolkit.GeocodingService();
      geocoding.forward({ query: "Innsbruck" }).then((results) => {
        if (results.length) {
          const r = results[0];
          new maptoolkit.Marker().setLngLat([r.lon, r.lat]).addTo(map);
          map.flyTo({ center: [r.lon, r.lat], zoom: 13 });
        }
      });
    </script>
  </body>
</html>
