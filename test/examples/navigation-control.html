<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./../../dist/mtk.css" />
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      padding: 0;
      margin: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <script src="./../../dist/mtk.js"></script>
  <script>
    let map = new maptoolkit.Map({ locale: maptoolkit.Locale.de });
    map.setContainer("map");
    let ctrl = new maptoolkit.NavigationControl();
    map.addControl(ctrl, "bottom-left");
  </script>
</body>

</html>
