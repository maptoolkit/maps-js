<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./../../dist/maptoolkit.css" />
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      padding: 0;
      margin: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <script src="./../../dist/maptoolkit.js"></script>
  <script>
    const map = new maptoolkit.Map({ style: "maptoolkit://style/toursprung/terrain", apiKey: "toursprung" });
    map.setContainer("map");
    const ctrl = new maptoolkit.IsochroneControl({ type: "foot", range: 30 });
    map.addControl(ctrl);
  </script>
</body>

</html>
