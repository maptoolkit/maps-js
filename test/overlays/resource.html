<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./../../dist/mtk.css" />
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      padding: 0;
      margin: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <script src="./../../dist/mtk.js"></script>
  <script>
    MTK.init({ apiKey: "toursprung" }).createMap("map", {
      map: {
        location: { center: [13.13710, 47.75251], zoom: 6, pitch: 0 },
        mapType: "toursprung-terrain",
      }
    }, (map) => {
      new MTK.Resource({
        name: "wikipedia",
        filter: ["all", ["==", "language", "de"], ["==", "type", "landmark"]],
      }).addTo(map);
    });
  </script>
</body>

</html>
