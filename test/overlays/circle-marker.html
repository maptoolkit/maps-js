<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./../../dist/mtk.css" />
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      padding: 0;
      margin: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <script src="./../../dist/mtk.js"></script>
  <script>
    MTK.init({ apiKey: "toursprung" }).createMap("map", {
      map: {
        location: { center: [11.40037, 47.26816], zoom: 12, pitch: 0 },
        mapType: "toursprung-terrain",
      }
    }, (map) => {
      let lngLat = map.gl.getCenter().toArray();
      new MTK.CircleMarker({
        circleRadius: 10,
        circleColor: "#f00",
        circleOpacity: 1,
        circleStrokeWidth: 2,
        circleStrokeColor: "#fff",
        circleStrokeOpacity: 0.75,
      }).setLngLat(lngLat).addTo(map);
    });
  </script>
</body>

</html>
