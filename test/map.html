<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./../dist/maptoolkit.css" />
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      padding: 0;
      margin: 0;
    }
  </style>
</head>

<body>
  <script src="./../dist/maptoolkit.js"></script>
  <script>
    var map = new maptoolkit.Map({ apiKey: "toursprung", hash: true, style: "maptoolkit://styles/toursprung/terrain" }).setContainer(document.body);
    map.addControl(new maptoolkit.NavigationControl())

    map.once("style.load", () => {
      map.addControl(new maptoolkit.StyleControl())

      map.addSource("test", {
        type: "geojson",
        data: {
          type: "FeatureCollection",
          features: [{
            type: "Feature",
            geometry: {
              type: "Point",
              coordinates: [16.360606, 48.200114],
            }
          }]
        },
        generateId: true,
      });

      map.addLayer({
        id: "test",
        type: "circle",
        source: "test",
        paint: {
          "circle-color": "#000",
          "circle-radius": 10,
        },
        metadata: {
          "mtk:states": {
            hover: {
              paint: {
                "circle-color": "#0f0",
              },
            },
            select: {
              paint: {
                "circle-color": "#f00",
              },
            },
          },
        }
      })
    });
  </script>
</body>

</html>
